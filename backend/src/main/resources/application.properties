spring.application.name=backend

# Render (and most hosts) inject PORT; default 8080 for local.
server.port=${PORT:8080}

# PostgreSQL datasource (values supplied via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Supabase JWT validation (Project Settings → API → JWT Settings)
# Issuer format: https://YOUR_PROJECT_REF.supabase.co/auth/v1
# Leave empty to disable API auth during local development.
supabase.jwt.issuer-uri=${SUPABASE_JWT_ISSUER:}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_JWT_ISSUER:}
spring.security.oauth2.resourceserver.jwt.audiences=authenticated

# First account with this email becomes platform admin (optional bootstrap).
app.bootstrap-admin-email=${BOOTSTRAP_ADMIN_EMAIL:}
